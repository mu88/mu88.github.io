name: Deploy GitHub Pages

on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2:00 UTC
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GEM_HOME: ${{ github.workspace }}/.gems
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1  # v5.4.0
        with:
          global-json-file: global.json

      - name: Add Ruby gem bin to PATH
        run: echo "$GEM_HOME/bin" >> "$GITHUB_PATH"

      - name: Install Jekyll dependencies
        run: gem install jekyll jekyll-paginate jekyll-seo-tag jekyll-sitemap jemoji --no-document --install-dir "$GEM_HOME"

      - name: Build Jekyll site
        run: jekyll build --destination _site

      - name: Generate slowUp calendar
        run: dotnet run --file scripts/generate-slowup-ics.cs -- --output "${{ github.workspace }}/_site/slowUp.ics"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}slowUp.ics
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
